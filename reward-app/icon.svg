<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.6" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <g transform="translate(256 280)">
    <!-- piggy body -->
    <ellipse cx="0" cy="0" rx="150" ry="110" fill="#fbcfe8"/>
    <!-- snout -->
    <ellipse cx="120" cy="-10" rx="45" ry="38" fill="#f9a8d4"/>
    <circle cx="110" cy="-18" r="6" fill="#831843"/>
    <circle cx="130" cy="-18" r="6" fill="#831843"/>
    <!-- eye -->
    <circle cx="40" cy="-40" r="8" fill="#1f2937"/>
    <circle cx="42" cy="-42" r="3" fill="#fff"/>
    <!-- ear -->
    <path d="M -30 -80 Q -50 -120 -10 -110 Z" fill="#f9a8d4"/>
    <!-- legs -->
    <rect x="-100" y="80" width="30" height="40" rx="8" fill="#f9a8d4"/>
    <rect x="70" y="80" width="30" height="40" rx="8" fill="#f9a8d4"/>
    <!-- slot -->
    <rect x="-25" y="-85" width="50" height="10" rx="5" fill="#831843"/>
    <!-- tail -->
    <path d="M -150 -10 q -20 -10 -10 -30 q 20 -10 10 20" fill="none" stroke="#f9a8d4" stroke-width="10" stroke-linecap="round"/>
  </g>
  <!-- coin going in -->
  <g transform="translate(256 110)">
    <circle r="38" fill="url(#coin)" stroke="#b45309" stroke-width="4"/>
    <text x="0" y="14" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="44" font-weight="800" fill="#92400e">kr</text>
  </g>
</svg>
